<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marche à suivre — Frontière</title>
<style>
  /* ── LIGHT MODE (défaut) ── */
  :root {
    --teal:       #1a4f4f;
    --teal-hover: #236060;
    --gold:       #8a6200;
    --gold-bg:    #fff3cc;
    --red:        #7a1e1e;
    --red-bg:     #fde8e8;
    --green:      #1a4f2e;
    --green-bg:   #e4f5ea;
    --blue:       #1a3a5f;
    --blue-bg:    #e4edf8;
    --bg:         #f0e8de;
    --card:       #ffffff;
    --text:       #111111;
    --muted:      #555555;
    --border:     #d0c8bc;

    /* boutons de choix */
    --btn-yes-bg:     #e4f5ea;
    --btn-yes-border: #b2d9be;
    --btn-yes-icon:   #c3ebce;
    --btn-no-bg:      #fde8e8;
    --btn-no-border:  #f0bcbc;
    --btn-no-icon:    #f7cccc;
    --btn-opt-bg:     #fff3cc;
    --btn-opt-border: #e8d080;
    --btn-opt-icon:   #ffe9a0;
    --btn-neu-bg:     #e4edf8;
    --btn-neu-border: #b4c9e2;
    --btn-neu-icon:   #c8daf0;
  }

  /* ── DARK MODE ── */
  [data-theme="dark"] {
    --teal:       #4db8b8;
    --teal-hover: #5ecece;
    --gold:       #f0c040;
    --gold-bg:    #2e2500;
    --red:        #ff7070;
    --red-bg:     #2e0a0a;
    --green:      #5cd68a;
    --green-bg:   #0a2218;
    --blue:       #7ab4f0;
    --blue-bg:    #0a1a2e;
    --bg:         #0f1419;
    --card:       #1a2230;
    --text:       #e8edf2;
    --muted:      #8a9ab0;
    --border:     #2a3a4a;

    --btn-yes-bg:     #0d2e1a;
    --btn-yes-border: #1e5c36;
    --btn-yes-icon:   #174d2c;
    --btn-no-bg:      #2e0d0d;
    --btn-no-border:  #5c1e1e;
    --btn-no-icon:    #4d1717;
    --btn-opt-bg:     #2a1e00;
    --btn-opt-border: #6b4e00;
    --btn-opt-icon:   #503a00;
    --btn-neu-bg:     #0a1828;
    --btn-neu-border: #1e3a5a;
    --btn-neu-icon:   #162e4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 60px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    margin-bottom: 28px;
  }

  header h1 {
    font-size: 1.9rem;
    font-weight: 800;
    color: var(--teal);
    letter-spacing: -0.5px;
  }

  header p {
    color: var(--muted);
    font-size: 1rem;
    margin-top: 6px;
  }

  /* ── BREADCRUMB ── */
  #breadcrumb {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 20px;
    max-width: 680px;
    width: 100%;
    font-weight: 500;
  }

  #breadcrumb .bc-item { color: var(--teal); font-weight: 700; }
  #breadcrumb .sep { color: #aaa; font-size: 0.9rem; }

  /* ── CARD ── */
  #card {
    background: var(--card);
    border-radius: 20px;
    box-shadow: 0 6px 32px rgba(0,0,0,0.12);
    padding: 36px 32px;
    max-width: 680px;
    width: 100%;
    animation: fadeIn 0.22s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── STEP LABEL ── */
  .step-label {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    background: var(--teal);
    color: white;
    border-radius: 6px;
    padding: 4px 10px;
    margin-bottom: 16px;
  }

  /* ── QUESTION ── */
  .question {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--teal);
    margin-bottom: 10px;
    line-height: 1.35;
  }

  .subtitle {
    font-size: 1.05rem;
    color: var(--muted);
    margin-bottom: 26px;
    line-height: 1.6;
    font-weight: 500;
  }

  /* ── ACTION BOXES ── */
  .action-box {
    border-radius: 14px;
    padding: 20px 22px;
    margin-bottom: 16px;
    line-height: 1.65;
  }

  .action-box .box-title {
    font-size: 0.8rem;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .action-box p, .action-box li {
    font-size: 1.05rem;
    font-weight: 500;
  }

  .action-box ul {
    margin: 4px 0 0 20px;
  }

  .action-box ul li {
    margin-bottom: 6px;
  }

  .action-box.info {
    background: var(--blue-bg);
    border-left: 5px solid var(--blue);
  }
  .action-box.info .box-title { color: var(--blue); }

  .action-box.warn {
    background: var(--gold-bg);
    border-left: 5px solid var(--gold);
  }
  .action-box.warn .box-title { color: var(--gold); }

  .action-box.danger {
    background: var(--red-bg);
    border-left: 5px solid var(--red);
  }
  .action-box.danger .box-title { color: var(--red); }

  .action-box.success {
    background: var(--green-bg);
    border-left: 5px solid var(--green);
  }
  .action-box.success .box-title { color: var(--green); }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* ── SECONDARY QUESTION ── */
  .question2 {
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--teal);
    margin-bottom: 18px;
    line-height: 1.35;
  }

  /* ── OPTION BUTTONS ── */
  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 16px;
    border: 2.5px solid transparent;
    border-radius: 14px;
    padding: 18px 20px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    color: var(--text);
  }

  .btn .icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  .btn .btn-text { flex: 1; line-height: 1.3; }
  .btn .btn-sub {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--muted);
    margin-top: 2px;
  }

  /* yes — vert */
  .btn.yes { background: var(--btn-yes-bg); border-color: var(--btn-yes-border); }
  .btn.yes .icon { background: var(--btn-yes-icon); }
  .btn.yes:hover { border-color: var(--green); color: var(--green); filter: brightness(1.08); }

  /* no — rouge */
  .btn.no { background: var(--btn-no-bg); border-color: var(--btn-no-border); }
  .btn.no .icon { background: var(--btn-no-icon); }
  .btn.no:hover { border-color: var(--red); color: var(--red); filter: brightness(1.08); }

  /* opt — or/jaune */
  .btn.opt { background: var(--btn-opt-bg); border-color: var(--btn-opt-border); }
  .btn.opt .icon { background: var(--btn-opt-icon); }
  .btn.opt:hover { border-color: var(--gold); color: var(--gold); filter: brightness(1.08); }

  /* neu — bleu */
  .btn.neu { background: var(--btn-neu-bg); border-color: var(--btn-neu-border); }
  .btn.neu .icon { background: var(--btn-neu-icon); }
  .btn.neu:hover { border-color: var(--blue); color: var(--blue); filter: brightness(1.08); }

  /* ── RESTART / BACK ── */
  .btn-primary {
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 18px 24px;
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    width: 100%;
    margin-top: 16px;
    transition: background 0.18s;
    letter-spacing: 0.2px;
  }

  .btn-primary:hover { background: var(--teal-hover); }

  #back-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 22px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0;
  }

  #back-btn:hover { color: var(--teal); }

  /* ── THEME TOGGLE ── */
  #theme-btn {
    margin-top: 14px;
    background: var(--card);
    color: var(--teal);
    border: 2px solid var(--teal);
    border-radius: 20px;
    padding: 8px 18px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  #theme-btn:hover {
    background: var(--teal);
    color: white;
  }

  /* transition douce sur tout le body */
  body, #card, .action-box, .btn {
    transition: background 0.25s, color 0.25s, border-color 0.25s;
  }

  /* ── RESULT FOOTER ── */
  .result-footer {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
</style>
</head>
<body>

<div id="breadcrumb"></div>

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(stepId) {
  const step = steps[stepId];
  const card = document.getElementById('card');
  const bc   = document.getElementById('breadcrumb');

  // Breadcrumb
  bc.innerHTML = (step.breadcrumb || []).map((b, i, arr) => {
    const isLast = i === arr.length - 1;
    return isLast
      ? `<span class="bc-item">${b}</span>`
      : `${b} <span class="sep">›</span>`;
  }).join(' ');

  let html = `<div class="step-label">${step.label}</div>`;
  html += `<div class="question">${step.question}</div>`;
  if (step.subtitle) html += `<div class="subtitle">${step.subtitle}</div>`;

  // Action boxes
  if (step.actions) {
    step.actions.forEach(a => {
      html += `<div class="action-box ${a.type}">`;
      html += `<div class="box-title">${a.title}</div>`;
      if (a.body) html += `<p>${a.body}</p>`;
      if (a.list) {
        html += '<ul>' + a.list.map(l => `<li>${l}</li>`).join('') + '</ul>';
      }
      html += '</div>';
    });
  }

  // Divider + secondary question
  if (step.question2) {
    html += `<div class="divider"></div>`;
    html += `<div class="question2">${step.question2}</div>`;
  }

  // Options
  if (step.options) {
    html += '<div class="btn-group">';
    step.options.forEach(opt => {
      html += `<button class="btn ${opt.cls}" onclick="goto('${opt.next}')">
        <span class="icon">${opt.icon}</span>
        <span class="btn-text">
          ${opt.text}
          ${opt.sub ? `<div class="btn-sub">${opt.sub}</div>` : ''}
        </span>
        <span style="color:#aaa;font-size:1.2rem">›</span>
      </button>`;
    });
    html += '</div>';
  }

  // Result footer
  if (step.result) {
    html += `<div class="result-footer">
      <button class="btn-primary" onclick="restart()">🔄 Nouveau passage</button>
    </div>`;
  }

  // Back button
  if (history.length > 0) {
    html += `<button id="back-btn" onclick="goBack()">← Étape précédente</button>`;
  }

  card.innerHTML = html;
}

function goto(stepId) {
  history.push(current);
  current = stepId;
  render(current);
}

function goBack() {
  if (history.length === 0) return;
  current = history.pop();
  render(current);
}

function restart() {
  history.length = 0;
  current = 'start';
  render(current);
}

// ─── THEME ───────────────────────────────────────────────────────────────────
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('theme-btn').textContent = next === 'dark' ? '☀️ Mode clair' : '🌙 Mode sombre';
  localStorage.setItem('theme', next);
}

// Restaurer le thème sauvegardé
(function() {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = saved === 'dark' ? '☀️ Mode clair' : '🌙 Mode sombre';
  });
})();

render('start');
</script>
